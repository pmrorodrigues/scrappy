name: Worten Outlet Scraper

on:
  schedule:
    # Corre a cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite correr manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_RAM_GB: '0'
          MAX_PRICE: '0'
        run: python scraper.py

      - name: Commit seen products
        run: |
          git config user.name "Worten Scraper Bot"
          git config user.email "bot@scraper.local"
          git add seen_products.json || true
          git diff --staged --quiet || git commit -m "🔄 Update seen products $(date +'%Y-%m-%d %H:%M')"
          git push || true
